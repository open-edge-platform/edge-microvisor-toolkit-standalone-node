{{- range .Values.virtualMachines}}
{{- if .secondaryNetwork}}
---
# Per-VM NetworkAttachmentDefinition with static IP from values.yaml.
# Uses host-local IPAM with rangeStart=rangeEnd=ip to guarantee the
# exact IP defined in values.yaml is assigned to this VM's secondary
# interface. The bridge name must match the one created by
# network_config.sh (default: br0).
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{.name}}-bridge-network
  namespace: {{.namespace}}
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "type": "bridge",
      "bridge": "{{ .secondaryNetwork.bridgeName }}",
      "ipam": {
        "type": "host-local",
        "ranges": [
          [
            {
              "subnet": "{{ .secondaryNetwork.subnet }}",
              "rangeStart": "{{ .secondaryNetwork.ip }}",
              "rangeEnd": "{{ .secondaryNetwork.ip }}",
              "gateway": "{{ .secondaryNetwork.gatewayIp }}"
            }
          ]
        ]
      },
      "dns": {
        "nameservers": {{ .secondaryNetwork.nameservers | toJson }}
      }
    }
{{- end }}

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ub22-pv
  namespace: {{.namespace}}
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: /opt/user-apps/ub22vm
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - edgemicrovisortoolkit
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app/name: {{.name}}
  name: {{.name}}-bootdisk
  namespace: {{.namespace}}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{.storage}}
  storageClassName: {{.storageClassName}}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app/name: {{.name}}
  name: {{.name}}-rdp
  namespace: {{.namespace}}
spec:
  externalTrafficPolicy: Cluster
  ports:
    - name: rdp
      port: {{.rdpPort}}
      protocol: TCP
      targetPort: 3389
  selector:
    app/name: {{.name}}
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app/name: {{.name}}
  name: {{.name}}-ssh
  namespace: {{.namespace}}
spec:
  ports:
    - name: ssh
      port: 22
      protocol: TCP
      targetPort: 22
      nodePort: 30022
  selector:
    app/name: {{.name}}
  type: NodePort
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  labels:
    app/name: {{.name}}
  name: {{.name}}-vm
  namespace: {{.namespace}}
spec:
  running: true
  template:
    metadata:
      annotations:
        hooks.kubevirt.io/hookSidecars: >-
            [
              {
                "args": ["--version", "v1alpha2"],
                "configMap": {
                  "name": "sidecar-ub22-dp1",
                  "key": "my_script.sh",
                  "hookPath": "/usr/bin/onDefineDomain"
                }
              }
            ]
      labels:
        app/name: {{.name}}
    spec:
      domain:
        cpu:
          cores: {{.cpuCores}}
          model: host-passthrough
        devices:
          autoattachGraphicsDevice: false
          autoattachPodInterface: true
          gpus:
            - deviceName: intel.com/sriov-gpudevice
              name: gpu1
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: bootdisk
            - name: cloudinitdisk
              disk:
                bus: virtio
          tpm: {}
          interfaces:
            - name: default
              masquerade: {}
              macAddress: {{.primaryMacAddress}}
            - name: secondary-bridge-nic
              macAddress: {{.secondaryMacAddress}}
              bridge: {}
        firmware:
          bootloader:
            efi:
              secureBoot: {{.secureBoot}}
        machine:
          type: q35
        features:
          acpi:
            enabled: true
          apic:
            enabled: true
          smm:
            enabled: true
        memory:
          guest: {{.memory}}
          hugepages:
            pageSize: "2Mi"
        resources:
          requests:
            intel.com/igpu: 1
            intel.com/udma: 1
            intel.com/x11: 1
            hugepages-2Mi: {{.memory}}
            ephemeral-storage: "1Gi"
            intel.com/usb: 1
            intel.com/vfio: 1
          limits:
            intel.com/igpu: 1
            intel.com/udma: 1
            intel.com/x11: 1
            hugepages-2Mi: {{.memory}}
            ephemeral-storage: "2Gi"
            intel.com/usb: 1
            intel.com/vfio: 1
      networks:
        - name: default
          pod: {}
        - name: secondary-bridge-nic
          multus:
            networkName: {{ .namespace }}/{{ .name }}-bridge-network
      terminationGracePeriodSeconds: 0
      volumes:
        - name: bootdisk
          persistentVolumeClaim:
            claimName: {{.name}}-bootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: {{.name}}
              manage_etc_hosts: true
              write_files:
                - path: /etc/netplan/60-enp2s0-static.yaml
                  permissions: '0644'
                  content: |
                    network:
                      version: 2
                      ethernets:
                        enp2s0:
                          dhcp4: true
                          dhcp4-overrides:
                            route-metric: 200
                          nameservers:
                            addresses: {{.secondaryNetwork.nameservers}}
              runcmd:
                - netplan apply
                - systemctl restart systemd-networkd
                - systemctl restart systemd-resolved
                - sleep 5
                - ip addr show
                - ip route show
                - >-
                  ping -c 3 {{.secondaryNetwork.gatewayIp}} ||
                  echo "Gateway ping failed"
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app/name: {{.name}}
  name: plc
  namespace: {{.namespace}}
spec:
  ports:
    - name: plcport1
      port: 8080
      protocol: TCP
      targetPort: 8080
      nodePort: 30080
    - name: plcport2
      port: 5357
      protocol: TCP
      targetPort: 5357
      nodePort: 30357
    - name: plcport3
      port: 9867
      protocol: TCP
      targetPort: 9867
      nodePort: 30867
  selector:
    app/name: {{.name}}
  type: NodePort

{{- end}}
