---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sidecar-ub22-dp1
  namespace: user-apps
  labels:
    os: ubuntu
    type: sidecar-script
data:
  my_script.sh: |
    #!/bin/sh
    tempFile=`mktemp`
    echo $4 > $tempFile
    sed_expr_part1="/devices><qemu:commandline><qemu:arg value='-device'/>"
    sed_expr_part2="<qemu:arg value='driver=virtio-vga,max_outputs=1,blob=true,"
    sed_expr_part3="bus=pcie.0,addr=0x3'/> <qemu:arg value='-device'/>"
    sed_expr_part4="<qemu:arg value='qemu-xhci,id=usb-controller,bus=pcie.0,"
    sed_expr_part5="addr=0x14'/> </qemu:commandline>"
    replacement="${sed_expr_part1}${sed_expr_part2}"
    replacement="${replacement}${sed_expr_part3}"
    replacement="${replacement}${sed_expr_part4}${sed_expr_part5}"
    sed -i \
      "s|/devices>|${replacement}|" \
      "$tempFile"
    echo $tempFile > /tmp/t.xml
    cat $tempFile
