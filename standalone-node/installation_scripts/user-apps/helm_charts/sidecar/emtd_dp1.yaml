---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sidecar-emtd-dp1
  namespace: user-apps
  labels:
    os: emtd
    type: sidecar-script
data:
  my_script.sh: |
    #!/bin/sh
    tempFile=`mktemp`
    echo $4 > $tempFile
    sed_expr_part1="/devices><qemu:commandline><qemu:arg value='-device'/>"
    sed_expr_part2="<qemu:arg value='driver=virtio-vga,max_outputs=1,blob=true,"
    sed_expr_part3="bus=pcie.0,addr=0x3'/></qemu:commandline>"
    sed -i \
      "s|/devices>|${sed_expr_part1}${sed_expr_part2}${sed_expr_part3}|" \
      "$tempFile"
    echo $tempFile > /tmp/t.xml
    cat $tempFile
